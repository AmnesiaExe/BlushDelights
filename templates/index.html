<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, intial-scale=1.0">
    <title>Blush Delight</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css')}}">
</head>
    
<body>
    <div class="container">
        <h1>Blush Delight</h1>
        <p>Custom Cake Order Form</p>

        <form action="/submit" method="POST">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="amount">Amount:</label>
            <input type="number" id="amount" name="amount" min="1" required>

            <label for="cake_type">Cake Type:</label>
            <input type="text" id="cake_type" name="cake_type" required>

            <label for="flavour">Flavour:</label>
            <input type="text" id="flavour" name="flavour" required>


            <label for="size">Size:</label>
            <select id="size" name="size" required>
                <option value="">Select size</option>
                <option value="Small">Small</option>
                <option value="Medium">Medium</option>
                <option value="Large">Large</option>
            </select>

            <label for="occasion">Occasion:</label>
            <input type="text" id="occasion" name="occasion" required>

            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>

            <button type="submit">Sumit Order</button>
        </form>
    </div>
</body>
</html>
